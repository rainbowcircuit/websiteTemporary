<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Editor</title>
    <link rel="stylesheet" href="editorStyle.css">
    <script src="editor.js" defer></script>
</head>
<body>
    <div class="toolbar">
        <button id="prev">Previous</button>
        <button id="next">Next</button>
        <button id="new">New</button>
        <button id="save">Save</button>
        <button id="delete">Delete</button>
    </div>

    <div class="field-group">
        <label for="monthTextArea">Month</label>
        <textarea id="monthTextArea"></textarea>
    </div>

    <div class="field-group">
        <label for="dayTextArea">Day</label>
        <textarea id="dayTextArea"></textarea>
    </div>

    <div class="field-group">
        <label for="titleTextArea">Title</label>
        <textarea id="titleTextArea"></textarea>
    </div>

    <div class="field-group">
        <label for="entryTextArea">Entry</label>
        <textarea id="entryTextArea"></textarea>
    </div>
</body>
</html>
